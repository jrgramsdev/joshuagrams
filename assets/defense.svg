<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="radar-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <circle cx="320" cy="180" r="150" fill="url(#radar-glow)"/>
  <circle cx="320" cy="180" r="50"  stroke="#ff6a00" stroke-opacity="0.35" stroke-width="1" fill="none"/>
  <circle cx="320" cy="180" r="100" stroke="#ff6a00" stroke-opacity="0.3"  stroke-width="1" fill="none"/>
  <circle cx="320" cy="180" r="150" stroke="#ff6a00" stroke-opacity="0.22" stroke-width="1" fill="none"/>
  <line x1="170" y1="180" x2="470" y2="180" stroke="#ff6a00" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="320" y1="30"  x2="320" y2="330" stroke="#ff6a00" stroke-opacity="0.2" stroke-width="1"/>
  <g>
    <path d="M320 180 L470 180 A150 150 0 0 0 395 50 Z" fill="url(#sweep)"/>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 320 180" to="360 320 180" dur="4s" repeatCount="indefinite"/>
  </g>
  <circle cx="380" cy="140" r="4" fill="#ff6a00">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="140" fill="#ff6a00" fill-opacity="0.25">
    <animate attributeName="r" values="6;14;6" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.4;0;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="220" r="3" fill="#ff6a00" fill-opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="410" cy="205" r="3" fill="#ff6a00" fill-opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.15;0.55" dur="1.9s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
</svg>
