<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="k-yes" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="k-no" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <path d="M30 280 Q 160 280, 200 220 T 320 130 T 440 220 T 610 280"
        stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" fill="none"/>
  <rect x="260" width="50" fill="url(#k-yes)" rx="4">
    <animate attributeName="y"      values="150;130;170;145;150" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="height" values="180;200;160;185;180" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="330" width="50" fill="url(#k-no)" rx="4">
    <animate attributeName="y"      values="210;230;195;215;210" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="height" values="120;100;135;115;120" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <text x="285" y="348" fill="#ff6a00" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" opacity="0.8">YES</text>
  <text x="355" y="348" fill="#0a84ff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" opacity="0.8">NO</text>
</svg>
